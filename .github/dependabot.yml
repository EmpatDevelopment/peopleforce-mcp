# Dependabot configuration — see
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Keep npm dependencies (runtime + dev) fresh.
  # Major version bumps are ignored — they require intentional migration effort
  # (API changes, config rewrites). Security patches are NOT filtered by the
  # `ignore` block: Dependabot security updates always open PRs regardless of
  # semver, so CVE fixes still flow through automatically.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Kyiv
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      # Bundle patch + minor bumps into a single PR per group to cut review load.
      runtime:
        dependency-type: production
        update-types:
          - patch
          - minor
      dev:
        dependency-type: development
        update-types:
          - patch
          - minor

  # Keep GitHub Actions (actions/checkout, setup-node, etc.) up to date.
  # Actions majors are generally safe and small — we do NOT ignore majors here.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
